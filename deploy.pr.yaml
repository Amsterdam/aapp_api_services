#################################################
#
# PR pipeline (develop flow)
# - Triggers on PRs
# - Builds & pushes images
# - Deploys to dev
#
#################################################

pr:
  branches:
    include:
      - "*"

# Disable CI triggers for pushes/merges in this pipeline
trigger: none

resources:
  repositories:
    - repository: templates
      type: github
      endpoint: Amsterdam
      name: Amsterdam/common-azure-pipelines
      ref: refs/tags/1.20.3

    # Infra repo used by deploy.stage.yaml (it does `checkout: source`)
    # No trigger here: infra changes should not start this PR pipeline.
    - repository: source
      type: git
      name: Amsterdam-App/aapp_infra_azure
      ref: main

parameters:
  - name: versionOverride
    type: string
    default: ' '

  - name: migrationRollbackTarget
    type: string
    default: ' '

  - name: forceDeploy
    type: boolean
    default: false

  - name: services
    type: object
    default:
      - bridge
      - city_pass
      - construction_work
      - contact
      - image
      - modules
      - notification
      - waste
      - survey

variables:
  - name: Docker.Buildkit
    value: "1"

  - name: Self.Ref
    value: $[ variables['Build.SourceBranch'] ]

  - name: Self.BranchName
    value: $[ replace(replace(replace(variables['Self.Ref'], 'refs/heads/', ''), 'refs/tags/', ''), 'refs/pull/', '') ]

  - name: registry
    value: saks01weuacrpgpgo5qvmwo.azurecr.io

  - name: version
    ${{ if eq(parameters.versionOverride, ' ') }}:
      value: $[ format('{0}-{1}', replace(variables['Self.BranchName'], '/', '-'), variables['Build.SourceVersion']) ]
    ${{ else }}:
      value: ${{ parameters.versionOverride }}

stages:
  # --------------------
  # BUILD
  # --------------------
  - template: deploy.build-stage.yaml
    parameters:
      services: ${{ parameters.services }}
      stageDisplayName: Build & push

  # --------------------
  # DEV
  # --------------------
  - template: deploy.stage.yaml
    parameters:
      environment: dev
      devopsEnvironment: api-dev
      pool: ManagedDevOpsPools
      namespace: ns-ccc-aapp-ont-01-aapp-ontw
      kubernetesServiceConnection: SCN-K8S-ns-ccc-aapp-ont-01-aapp-ontw
      services: ${{ parameters.services }}
      force: ${{ parameters.forceDeploy }}
      migrationRollbackTarget: ${{ parameters.migrationRollbackTarget }}

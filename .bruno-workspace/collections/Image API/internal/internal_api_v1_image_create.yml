info:
  name: internal_api_v1_image_create
  type: http
  seq: 1
  tags:
    - internal

http:
  method: POST
  url: "{{baseUrl}}/internal/api/v1/image"
  headers:
    - name: X-Api-Key
      value: "{{apiKey}}"
  body:
    type: multipart-form
    data:
      - name: image
        type: file
        value: []
        description: Image file to upload
      - name: description
        type: text
        value: ""
        description: Optional description for the image
      - name: identifier
        type: text
        value: ""
        description: Optional identifier for the image
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/internal/api/v1/image"
      method: POST
      headers:
        - name: X-Api-Key
          value: "{{apiKey}}"
      body:
        type: multipart-form
        data:
          - name: image
            type: file
            value: []
            description: Image file to upload
          - name: description
            type: text
            value: ""
            description: Optional description for the image
          - name: identifier
            type: text
            value: ""
            description: Optional identifier for the image
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "identifier": "",
            "description": "",
            "variants": [
              {
                "image": "",
                "width": 0,
                "height": 0
              }
            ]
          }
  - name: 400 Response
    request:
      url: "{{baseUrl}}/internal/api/v1/image"
      method: POST
      headers:
        - name: X-Api-Key
          value: "{{apiKey}}"
      body:
        type: multipart-form
        data:
          - name: image
            type: file
            value: []
            description: Image file to upload
          - name: description
            type: text
            value: ""
            description: Optional description for the image
          - name: identifier
            type: text
            value: ""
            description: Optional identifier for the image
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "invalid",
            "detail": ""
          }

docs: |-
  Endpoint to create a new image set. This endpoint is network isolated and only accessible from other backend services.

  The image is uploaded in three different formats to Azure Blob Storage and variants are created in the database.

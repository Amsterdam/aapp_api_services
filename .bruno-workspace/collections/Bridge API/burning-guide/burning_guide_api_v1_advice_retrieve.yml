info:
  name: burning_guide_api_v1_advice_retrieve
  type: http
  seq: 1
  tags:
    - burning-guide

http:
  method: GET
  url: "{{baseUrl}}/burning-guide/api/v1/advice"
  headers:
    - name: X-Api-Key
      value: "{{apiKey}}"
  params:
    - name: postal_code
      value: ""
      type: query
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:

          value: "{{apiKey}}"
      params:
        - name: postal_code
          value: ""
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "postal_code": "",
            "model_runtime": "",
            "advice_0": 0,
            "advice_6": 0,
            "advice_12": 0,
            "advice_18": 0,
            "definitive_0": false,
            "definitive_6": false,

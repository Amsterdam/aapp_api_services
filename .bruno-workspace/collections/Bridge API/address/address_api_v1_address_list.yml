info:
  name: address_api_v1_address_list
  type: http
  seq: 1
  tags:
    - address

http:
  method: GET
  url: "{{baseUrl}}/address/api/v1/address"
  headers:
    - name: X-Api-Key
      value: "{{apiKey}}"
  params:
    - name: query
      value: ""
      type: query
    - name: street_name
      value: ""
      type: query
      disabled: true
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/address/api/v1/address"
      method: GET
      headers:
        - name: X-Api-Key
          value: "{{apiKey}}"
      params:
        - name: query
          value: ""
          type: query
        - name: street_name
          value: ""
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "city": "",
              "street": "",
              "coordinates": {
                "lat": 0,
                "lon": 0
              },
              "cityDistrict": "",
              "bagId": "",
              "number": "",
              "additionLetter": "",
              "additionNumber": "",
              "postcode": "",
              "type": "woonplaats"
            }
          ]
  - name: 401 Response
    request:
      url: "{{baseUrl}}/address/api/v1/address"
      method: GET
      headers:
        - name: X-Api-Key
          value: "{{apiKey}}"
      params:
        - name: query
          value: ""
          type: query
        - name: street_name
          value: ""
          type: query
          disabled: true
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "API_KEY_INVALID",
            "detail": ""
          }

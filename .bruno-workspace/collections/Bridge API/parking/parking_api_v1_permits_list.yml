  type: http
  seq: 21
  tags:
    - parking

http:
  method: GET
  url: "{{baseUrl}}/parking/api/v1/permits"
  headers:
    - name: SSP-Access-Token
      value: "{{access-token}}"
    - name: X-Api-Key
      value: "{{apiKey}}"
  params:
    - name: status
      value: INACTIVE
      type: query
      description: |-
        DEPRECATED OPTION

        * `INACTIVE` - INACTIVE
        * `Inactief` - Inactief
      disabled: true
    - name: status
      value: Inactief
      type: query
      description: |-
        DEPRECATED OPTION

        * `INACTIVE` - INACTIVE
        * `Inactief` - Inactief
      disabled: true
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


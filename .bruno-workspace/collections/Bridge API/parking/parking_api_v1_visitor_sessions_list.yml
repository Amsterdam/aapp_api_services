      description: |-
        * `ACTIVE` - ACTIVE
        * `PLANNED` - PLANNED
        * `COMPLETED` - COMPLETED
        * `CANCELLED` - CANCELLED
      disabled: true
    - name: vehicle_id
      value: ""
      type: query
      disabled: true
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


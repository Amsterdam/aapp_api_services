      value: ""
      type: query
      description: "Page number (default: 1)"
      disabled: true
    - name: page_size
      value: ""
      type: query
      description: "Page size (default: 10)"
      disabled: true
    - name: report_code
      value: ""
      type: query
      disabled: true
    - name: sort
      value: started_at:desc
      type: query
    - name: status
      value: ACTIVE
      type: query
      description: |-
        * `ACTIVE` - ACTIVE
        * `PLANNED` - PLANNED
        * `COMPLETED` - COMPLETED
        * `CANCELLED` - CANCELLED
      disabled: true
    - name: status
      value: PLANNED
      type: query
      description: |-
        * `ACTIVE` - ACTIVE
        * `PLANNED` - PLANNED
        * `COMPLETED` - COMPLETED
        * `CANCELLED` - CANCELLED
      disabled: true
    - name: status

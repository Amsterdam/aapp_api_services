info:
  name: parking_api_v1_account_details_retrieve
  type: http
  seq: 1
  tags:
    - parking

http:
  method: GET
  url: "{{baseUrl}}/parking/api/v1/account-details"
  headers:
    - name: SSP-Access-Token
      value: ""
      description: SSP Access Token
    - name: X-Api-Key
      value: "{{apiKey}}"
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


info:
  name: parking_api_v1_session_create
  type: http
  seq: 22
  tags:
    - parking

http:
  method: POST
  url: "{{baseUrl}}/parking/api/v1/session"
  headers:
    - name: DeviceId
      value: ""
    - name: SSP-Access-Token
      value: ""
      description: SSP Access Token
    - name: X-Api-Key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
        "parking_session": {
          "report_code": "",
          "payment_zone_id": "",
          "vehicle_id": "",
          "start_date_time": "",
          "end_date_time": "",
          "parking_machine": "",
          "parking_machine_favorite": false
        },
        "payment_type": "",
        "balance": "",
        "redirect": "",
        "locale": ""
      }
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


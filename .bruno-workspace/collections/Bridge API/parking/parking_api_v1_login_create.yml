info:
  name: parking_api_v1_login_create
  type: http
  seq: 15
  tags:
    - parking

http:
  method: POST
  url: "{{baseUrl}}/parking/api/v1/login"
  headers:
    - name: X-Api-Key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
        "report_code": "10000000",
        "pin": "1234"
      }
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

runtime:
  scripts:
    - type: after-response
      code: bru.setEnvVar('access-token', res.getBody().access_token)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


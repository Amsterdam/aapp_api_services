info:
  name: parking_api_v1_transactions_retrieve
  type: http
  seq: 29
  tags:
    - parking

http:
  method: GET
  url: "{{baseUrl}}/parking/api/v1/transactions"
  headers:
    - name: SSP-Access-Token
      value: ""
      description: SSP Access Token
    - name: X-Api-Key
      value: "{{apiKey}}"
  params:
    - name: filter_status
      value: COMPLETED
      type: query
    - name: page
      value: "1"
      type: query
    - name: page_size
      value: "10"
      type: query
    - name: sort
      value: paid_at:desc
      type: query
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


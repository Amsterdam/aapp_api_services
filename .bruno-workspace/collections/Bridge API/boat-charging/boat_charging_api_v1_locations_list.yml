info:
  name: boat_charging_api_v1_locations_list
  type: http
  seq: 1
  tags:
    - boat-charging

http:
  method: GET
  url: "{{baseUrl}}/boat-charging/api/v1/locations"
  headers:
    - name: Access-Token
      value: "{{access-token}}"
    - name: X-Api-Key
      value: "{{apiKey}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


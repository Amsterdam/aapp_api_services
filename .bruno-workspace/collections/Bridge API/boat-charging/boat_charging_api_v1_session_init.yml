info:
  name: boat_charging_api_v1_session_init
  type: http
  seq: 3
  tags:
    - boat-charging

http:
  method: POST
  url: "{{baseUrl}}/boat-charging/api/v1/sessions/init"
  headers:
    - name: Access-Token
      value: "{{access-token}}"
    - name: X-Api-Key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
        "station_id": "VCPS-IFZTY",
        "socket_number": "1",
        "name": "Test User",
        "email": "user@example.com",
        "return_url": "https://yourdomain.com/app/sessions"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


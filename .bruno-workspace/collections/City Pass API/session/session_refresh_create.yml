info:
  name: session_refresh_create
  type: http
  seq: 4
  tags:
    - session

http:
  method: POST
  url: "{{baseUrl}}/city-pass/api/v1/session/refresh"
  headers:
    - name: X-Api-Key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
        "refresh_token": ""
      }
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/city-pass/api/v1/session/refresh"
      method: POST
      headers:
        - name: X-Api-Key
          value: "{{apiKey}}"
      body:
        type: json
        data: |-
          {
            "refresh_token": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "access_token": "",
            "access_token_expiration": "",
            "refresh_token": "",
            "refresh_token_expiration": ""
          }
  - name: 401 Response
    request:
      url: "{{baseUrl}}/city-pass/api/v1/session/refresh"
      method: POST
      headers:
        - name: X-Api-Key
          value: "{{apiKey}}"
      body:
        type: json
        data: |-
          {
            "refresh_token": ""
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "TOKEN_INVALID",
            "detail": ""
          }

info:
  name: release_retrieve
  type: http
  seq: 1
  tags:
    - release

http:
  method: GET
  url: "{{baseUrl}}/modules/api/v1/release/:version"
  headers:
    - name: sessionid
      value: "{{apiKey}}"
  params:
    - name: version
      value: ""
      type: path
  auth:
    type: apikey
    key: sessionid
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/modules/api/v1/release/:version"
      method: GET
      headers:
        - name: sessionid
          value: "{{apiKey}}"
      params:
        - name: version
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "version": "",
            "releaseNotes": "",
            "isSupported": false,
            "isDeprecated": false,
            "published": "",
            "unpublished": "",
            "deprecated": "",
            "created": "",
            "modified": "",
            "modules": [
              {
                "moduleSlug": "",
                "version": "",
                "title": "",
                "description": "",
                "icon": "",
                "iconPath": "",
                "status": 0,
                "moduleStatus": 0,
                "moduleAppReason": "",
                "moduleFallbackUrl": "",
                "moduleButtonLabel": "",
                "releaseStatus": 0,
                "releaseAppReason": "",
                "releaseFallbackUrl": "",
                "releaseButtonLabel": ""
              }
            ],
            "latestVersion": "",
            "latestReleaseNotes": ""
          }
  - name: 401 Response
    request:
      url: "{{baseUrl}}/modules/api/v1/release/:version"
      method: GET
      headers:
        - name: sessionid
          value: "{{apiKey}}"
      params:
        - name: version
          value: ""
          type: path
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "API_KEY_INVALID",
            "detail": ""
          }
  - name: 404 Response
    request:
      url: "{{baseUrl}}/modules/api/v1/release/:version"
      method: GET
      headers:
        - name: sessionid
          value: "{{apiKey}}"
      params:
        - name: version
          value: ""
          type: path
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "RELEASE_NOT_FOUND",
            "detail": ""
          }

docs: Returns a specific release and the versions of the modules it consists of.

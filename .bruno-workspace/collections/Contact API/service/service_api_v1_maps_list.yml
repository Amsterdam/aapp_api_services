info:
  name: service_api_v1_maps_list
  type: http
  seq: 1
  tags:
    - service

http:
  method: GET
  url: "{{baseUrl}}/service/api/v1/maps"
  headers:
    - name: X-Api-Key
      value: "{{apiKey}}"
  params:
    - name: module_source
      value: handig-in-de-stad
      type: query
      description: |-
        Filter services based on their input module. Default is 'handig-in-de-stad'.

        * `handig-in-de-stad` - handig-in-de-stad
        * `koningsdag` - koningsdag
    - name: module_source
      value: koningsdag
      type: query
      description: |-
        Filter services based on their input module. Default is 'handig-in-de-stad'.

        * `handig-in-de-stad` - handig-in-de-stad
        * `koningsdag` - koningsdag
      disabled: true
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


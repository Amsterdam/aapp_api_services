info:
  name: articles_retrieve
  type: http
  seq: 1
  tags:
    - articles

http:
  method: GET
  url: "{{baseUrl}}/construction-work/api/v1/articles"
  headers:
    - name: X-Api-Key
      value: "{{apiKey}}"
  params:
    - name: limit
      value: ""
      type: query
      disabled: true
    - name: project_ids
      value: ""
      type: query
      description: Project ids, comma seperated
    - name: sort_by
      value: ""
      type: query
      disabled: true
    - name: sort_order
      value: ""
      type: query
      disabled: true
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:

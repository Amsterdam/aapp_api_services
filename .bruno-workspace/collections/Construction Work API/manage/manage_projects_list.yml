info:
  name: manage_projects_list
  type: http
  seq: 1
  tags:
    - manage

http:
  method: GET
  url: "{{baseUrl}}/construction-work/api/v1/manage/projects"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/construction-work/api/v1/manage/projects"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": 0,
              "foreign_id": 0,
              "title": "",
              "subtitle": "",
              "image": {
                "id": 0,
                "sources": [
                  {
                    "uri": "",
                    "width": 0,
                    "height": 0
                  }
                ],
                "aspectRatio": 0,
                "alternativeText": "",
                "image_set": 0
              },
              "creation_date": "",
              "publishers": "",
              "warning_count": 0,
              "article_count": 0
            }
          ]
  - name: 403 Response
    request:
      url: "{{baseUrl}}/construction-work/api/v1/manage/projects"
      method: GET
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "permission_denied",
            "detail": ""
          }

docs: Return list of all projects, limit to own projects if request is from publisher.

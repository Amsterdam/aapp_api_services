info:
  name: manage_publishers_list
  type: http
  seq: 4
  tags:
    - manage

http:
  method: GET
  url: "{{baseUrl}}/construction-work/api/v1/manage/publishers"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/construction-work/api/v1/manage/publishers"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": 0,
              "projects": [],
              "name": "",
              "email": ""
            }
          ]
  - name: 403 Response
    request:
      url: "{{baseUrl}}/construction-work/api/v1/manage/publishers"
      method: GET
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "permission_denied",
            "detail": ""
          }

docs: API view to list all project managers or create a new one.

info:
  name: project_news_retrieve
  type: http
  seq: 2
  tags:
    - project

http:
  method: GET
  url: "{{baseUrl}}/construction-work/api/v1/project/news"
  headers:
    - name: X-Api-Key
      value: "{{apiKey}}"
  params:
    - name: id
      value: ""
      type: query
      description: Article id
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


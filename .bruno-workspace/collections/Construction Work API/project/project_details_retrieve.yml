info:
  name: project_details_retrieve
  type: http
  seq: 1
  tags:
    - project

http:
  method: GET
  url: "{{baseUrl}}/construction-work/api/v1/project/details"
  headers:
    - name: DeviceId
      value: ""
    - name: X-Api-Key
      value: "{{apiKey}}"
  params:
    - name: id
      value: ""
      type: query
      description: Project id
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


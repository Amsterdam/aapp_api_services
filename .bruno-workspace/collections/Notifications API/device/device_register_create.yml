info:
  name: device_register_create
  type: http
  seq: 10
  tags:
    - device

http:
  method: POST
  url: "{{baseUrl}}/notification/api/v1/device/register"
  headers:
    - name: DeviceId
      value: ""
    - name: X-Api-Key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
        "firebase_token": "",
        "os": ""
      }
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/notification/api/v1/device/register"
      method: POST
      headers:
        - name: DeviceId
          value: ""
        - name: X-Api-Key
          value: "{{apiKey}}"
      body:
        type: json
        data: |-
          {
            "firebase_token": "",
            "os": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "external_id": "",
            "os": "",
            "firebase_token": "",
            "last_seen": ""
          }
  - name: 400 Response
    request:
      url: "{{baseUrl}}/notification/api/v1/device/register"
      method: POST
      headers:
        - name: DeviceId
          value: ""
        - name: X-Api-Key
          value: "{{apiKey}}"
      body:
        type: json
        data: |-
          {
            "firebase_token": "",
            "os": ""
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "INPUT_DATA",
            "detail": ""
          }
  - name: 401 Response
    request:
      url: "{{baseUrl}}/notification/api/v1/device/register"
      method: POST
      headers:
        - name: DeviceId
          value: ""
        - name: X-Api-Key
          value: "{{apiKey}}"
      body:
        type: json
        data: |-
          {
            "firebase_token": "",
            "os": ""
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "API_KEY_INVALID",
            "detail": ""
          }

docs: |-
  Create a new device with firebase token and os if device id is not known yet.
  Update device with firebase token and os if device is already known.

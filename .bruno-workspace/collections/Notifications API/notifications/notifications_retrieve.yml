info:
  name: notifications_retrieve
  type: http
  seq: 2
  tags:
    - notifications

http:
  method: GET
  url: "{{baseUrl}}/notification/api/v1/notifications/:notification_id"
  headers:
    - name: DeviceId
      value: ""
    - name: X-Api-Key
      value: "{{apiKey}}"
  params:
    - name: notification_id
      value: ""
      type: path
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:

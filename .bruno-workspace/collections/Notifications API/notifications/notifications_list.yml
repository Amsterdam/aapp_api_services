info:
  name: notifications_list
  type: http
  seq: 1
  tags:
    - notifications

http:
  method: GET
  url: "{{baseUrl}}/notification/api/v1/notifications"
  headers:
    - name: DeviceId
      value: ""
    - name: X-Api-Key
      value: "{{apiKey}}"
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/notification/api/v1/notifications"
      method: GET
      headers:
        - name: DeviceId
          value: ""
        - name: X-Api-Key
          value: "{{apiKey}}"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "",
              "title": "",
              "body": "",
              "module_slug": "",
              "context": "",
              "created_at": "",
              "pushed_at": "",
              "is_read": false,
              "image": ""
            }
          ]
  - name: 400 Response
    request:
      url: "{{baseUrl}}/notification/api/v1/notifications"
      method: GET
      headers:
        - name: DeviceId
          value: ""
        - name: X-Api-Key
          value: "{{apiKey}}"
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "MISSING_DEVICE_ID",
            "detail": ""
          }
  - name: 401 Response
    request:
      url: "{{baseUrl}}/notification/api/v1/notifications"
      method: GET
      headers:
        - name: DeviceId
          value: ""
        - name: X-Api-Key
          value: "{{apiKey}}"
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "API_KEY_INVALID",
            "detail": ""
          }

docs: List all notifications for a device_id.

info:
  name: modules_list
  type: http
  seq: 1
  tags:
    - modules

http:
  method: GET
  url: "{{baseUrl}}/notification/api/v1/modules"
  headers:
    - name: X-Api-Key
      value: "{{apiKey}}"
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/notification/api/v1/modules"
      method: GET
      headers:
        - name: X-Api-Key
          value: "{{apiKey}}"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "module": "",
              "description": "",
              "types": [
                {
                  "type": "",
                  "description": "",
                  "visibility": "visible"
                }
              ]
            }
          ]

docs: List all modules that can be used to send notifications.

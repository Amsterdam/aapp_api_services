info:
  name: address_create
  type: http
  seq: 1
  tags:
    - address

http:
  method: POST
  url: "{{baseUrl}}/notification/api/v1/address"
  headers:
    - name: DeviceId
      value: ""
    - name: X-Api-Key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
        "city": "",
        "street": "",
        "coordinates": {
          "lat": 0,
          "lon": 0
        },
        "cityDistrict": "",
        "bagId": "",
        "number": "",
        "additionLetter": "",
        "additionNumber": "",
        "postcode": ""
      }
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:

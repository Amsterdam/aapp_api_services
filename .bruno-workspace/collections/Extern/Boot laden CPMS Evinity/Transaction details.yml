info:
  name: Transaction details
  type: http
  seq: 10

http:
  method: GET
  url: "{{base_path}}/operator-api/transactions/:transaction_id"
  params:
    - name: transaction_id
      value: "13"
      type: path
    - name: includeTotal
      value: "true"
      type: query
      disabled: true
    - name: page
      value: "0"
      type: query
      disabled: true
    - name: size
      value: "20"
      type: query
      disabled: true
    - name: domainOnly
      value: "false"
      type: query
      disabled: true
  auth: inherit

runtime:
  variables:
    - name: base_path
      value: https://cpms.service.staging.evinity.io/cpms/rest

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

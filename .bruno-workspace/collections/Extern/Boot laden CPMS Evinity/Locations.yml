info:
  name: Locations
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_path}}/locations"
  params:
    - name: filter
      value: countryCode%E2%89%A1%27NL%27%E2%88%A7partyId%3D%27INF%27
      type: query
      disabled: true
    - name: includeChargingStationCount
      value: "true"
      type: query
      disabled: true
    - name: includeTotal
      value: "true"
      type: query
      disabled: true
    - name: page
      value: "0"
      type: query
      disabled: true
    - name: size
      value: "20"
      type: query
      disabled: true
    - name: domainOnly
      value: "false"
      type: query
      disabled: true
  auth: inherit

runtime:
  variables:
    - name: base_path
      value: https://cpms.service.staging.evinity.io/cpms/rest

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

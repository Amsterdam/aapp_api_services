info:
  name: Command result
  type: http
  seq: 15

http:
  method: GET
  url: "{{base_path}}/operator-api/ocpp-command-results/:correlation-token"
  params:
    - name: correlation-token
      value: 3ee2c21e-eb82-4df4-a5ac-90ef1d3b6186
      type: path
    - name: includeTotal
      value: "true"
      type: query
      disabled: true
    - name: page
      value: "0"
      type: query
      disabled: true
    - name: size
      value: "20"
      type: query
      disabled: true
    - name: domainOnly
      value: "false"
      type: query
      disabled: true
  auth: inherit

runtime:
  variables:
    - name: base_path
      value: https://cpms.service.staging.evinity.io/cpms/rest

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

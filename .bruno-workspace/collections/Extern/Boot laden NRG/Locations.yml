info:
  name: Locations
  type: http
  seq: 4

http:
  method: GET
  url: "{{NRG_base_url}}/locations"
  headers:
    - name: User-Agent
      value: Mozilla/5.0
    - name: Accept
      value: application/json, text/plain, */*
    - name: Authorization
      value: "{{token}}"
      disabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

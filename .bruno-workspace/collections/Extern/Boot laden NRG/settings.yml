info:
  name: settings
  type: http
  seq: 3

http:
  method: GET
  url: "{{NRG_base_url}}/app-settings"
  headers:
    - name: User-Agent
      value: Mozilla/5.0
    - name: Accept
      value: application/json, text/plain, */*
    - name: Authorization
      value: "{{token}}"
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

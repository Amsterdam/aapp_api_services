info:
  name: container_pass_number_retrieve
  type: http
  seq: 1
  tags:
    - container

http:
  method: GET
  url: "{{baseUrl}}/waste/api/v1/container/pass-number"
  headers:
    - name: X-Api-Key
      value: "{{apiKey}}"
  params:
    - name: house_number
      value: ""
      type: query
      disabled: true
    - name: postal_code
      value: ""
      type: query
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:

info:
  name: articles_retrieve
  type: http
  seq: 2
  tags:
    - articles

http:
  method: GET
  url: "{{baseUrl}}/news/api/v1/articles/:id"
  headers:
    - name: X-Api-Key
      value: "{{apiKey}}"
  params:
    - name: id
      value: ""
      type: path
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/news/api/v1/articles/:id"
      method: GET
      headers:
        - name: X-Api-Key
          value: "{{apiKey}}"
      params:
        - name: id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "images": [
              {
                "uri": "",
                "width": 0,
                "height": 0
              }
            ],
            "liveblog_items": [
              {
                "id": 0,
                "creation_datetime": "",
                "title": "",
                "body": "",
                "message_order": 0
              }
            ],
            "foreign_id": 0,
            "last_seen": "",
            "title": "",
            "summary": "",
            "intro": "",
            "body": "",
            "in_all_news": false,
            "is_highlight": false,
            "is_liveblog": false,
            "is_district": false,
            "is_construction_work": false,
            "district": "",
            "url": "",
            "creation_datetime": "",
            "modification_datetime": "",
            "publication_datetime": "",
            "expiration_datetime": "",
            "is_active_liveblog": false,
            "liveblog_notification_send": "",
            "liveblog_version": 0
          }
  - name: 401 Response
    request:
      url: "{{baseUrl}}/news/api/v1/articles/:id"
      method: GET
      headers:
        - name: X-Api-Key
          value: "{{apiKey}}"
      params:
        - name: id
          value: ""
          type: path
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "API_KEY_INVALID",
            "detail": ""
          }

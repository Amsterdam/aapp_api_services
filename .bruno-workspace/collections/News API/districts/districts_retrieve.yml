info:
  name: districts_retrieve
  type: http
  seq: 1
  tags:
    - districts

http:
  method: GET
  url: "{{baseUrl}}/news/api/v1/districts"
  headers:
    - name: X-Api-Key
      value: "{{apiKey}}"
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/news/api/v1/districts"
      method: GET
      headers:
        - name: X-Api-Key
          value: "{{apiKey}}"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "data": [
              {
                "label": "",
                "name": ""
              }
            ]
          }
  - name: 401 Response
    request:
      url: "{{baseUrl}}/news/api/v1/districts"
      method: GET
      headers:
        - name: X-Api-Key
          value: "{{apiKey}}"
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "API_KEY_INVALID",
            "detail": ""
          }

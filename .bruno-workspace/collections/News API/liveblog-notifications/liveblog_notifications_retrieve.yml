info:
  name: liveblog_notifications_retrieve
  type: http
  seq: 1
  tags:
    - liveblog-notifications

http:
  method: GET
  url: "{{baseUrl}}/news/api/v1/liveblog-notifications/:article_id"
  headers:
    - name: DeviceId
      value: ""
    - name: X-Api-Key
      value: "{{apiKey}}"
  params:
    - name: article_id
      value: ""
      type: path
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/news/api/v1/liveblog-notifications/:article_id"
      method: GET
      headers:
        - name: DeviceId
          value: ""
        - name: X-Api-Key
          value: "{{apiKey}}"
      params:
        - name: article_id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "device_id": "",
            "article": 0
          }
  - name: 204 Response
    description: No response body
    request:
      url: "{{baseUrl}}/news/api/v1/liveblog-notifications/:article_id"
      method: GET
      headers:
        - name: DeviceId
          value: ""
        - name: X-Api-Key
          value: "{{apiKey}}"
      params:
        - name: article_id
          value: ""
          type: path
    response:
      status: 204
      statusText: No Content
      body:
        type: text
        data: ""
  - name: 400 Response
    request:
      url: "{{baseUrl}}/news/api/v1/liveblog-notifications/:article_id"
      method: GET
      headers:
        - name: DeviceId
          value: ""
        - name: X-Api-Key
          value: "{{apiKey}}"
      params:
        - name: article_id
          value: ""
          type: path
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "MISSING_DEVICE_ID",
            "detail": ""
          }
  - name: 401 Response
    request:
      url: "{{baseUrl}}/news/api/v1/liveblog-notifications/:article_id"
      method: GET
      headers:
        - name: DeviceId
          value: ""
        - name: X-Api-Key
          value: "{{apiKey}}"
      params:
        - name: article_id
          value: ""
          type: path
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "API_KEY_INVALID",
            "detail": ""
          }

docs: |-
  Mixin to pre-process the request to get the device id
  and bind it to the view.
  This mixin is used specifically for DRF views.

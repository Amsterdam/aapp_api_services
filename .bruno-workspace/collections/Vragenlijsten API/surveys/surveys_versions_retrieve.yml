          }
  - name: 401 Response
    request:
      url: "{{baseUrl}}/survey/api/v1/surveys/:unique_code/versions/:version"
      method: GET
      headers:
        - name: X-Api-Key
          value: "{{apiKey}}"
      params:
        - name: unique_code
          value: ""
          type: path
        - name: version
          value: ""
          type: path
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json

info:
  name: surveys_versions_list
  type: http
  seq: 3
  tags:
    - surveys

http:
  method: GET
  url: "{{baseUrl}}/survey/api/v1/surveys/:unique_code/versions"
  headers:
    - name: X-Api-Key
      value: "{{apiKey}}"
  params:
    - name: unique_code
      value: ""
      type: path
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/survey/api/v1/surveys/:unique_code/versions"
      method: GET
      headers:
        - name: X-Api-Key
          value: "{{apiKey}}"
      params:
        - name: unique_code
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "question_count": 0,
              "version": 0,
              "created_at": "",
              "active_from": ""
            }
          ]
  - name: 401 Response
    request:
      url: "{{baseUrl}}/survey/api/v1/surveys/:unique_code/versions"
      method: GET
      headers:
        - name: X-Api-Key
          value: "{{apiKey}}"
      params:
        - name: unique_code
          value: ""
          type: path
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "API_KEY_INVALID",
            "detail": ""
          }

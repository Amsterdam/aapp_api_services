http:
  method: GET
  url: "{{baseUrl}}/survey/api/v1/surveys/entries"
  headers:
    - name: X-Api-Key
      value: "{{apiKey}}"
  params:
    - name: page
      value: ""
      type: query
      description: A page number within the paginated result set.
      disabled: true
    - name: page_size
      value: ""
      type: query
      description: Number of results to return per page.
      disabled: true
    - name: survey_unique_code
      value: ""
      type: query
      description: Filter by Survey unique_code.
      disabled: true
    - name: survey_version
      value: ""
      type: query
      description: Filter by SurveyVersion id.
      disabled: true
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


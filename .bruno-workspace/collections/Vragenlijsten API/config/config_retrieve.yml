info:
  name: config_retrieve
  type: http
  seq: 1
  tags:
    - config

http:
  method: GET
  url: "{{baseUrl}}/survey/api/v1/config/:location"
  headers:
    - name: X-Api-Key
      value: "{{apiKey}}"
  params:
    - name: location
      value: ""
      type: path
  auth:
    type: apikey
    key: X-Api-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/survey/api/v1/config/:location"
      method: GET
      headers:
        - name: X-Api-Key
          value: "{{apiKey}}"
      params:
        - name: location
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "survey": {
              "latest_version": "",
              "title": "",
              "description": "",
              "unique_code": "",
              "team": "aapp"
            },
            "location": "",
            "fraction": 0,
            "cooldown": 0,
            "minimum_actions": 0
          }
  - name: 401 Response
    request:
      url: "{{baseUrl}}/survey/api/v1/config/:location"
      method: GET
      headers:
        - name: X-Api-Key
          value: "{{apiKey}}"
      params:
        - name: location
          value: ""
          type: path
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "API_KEY_INVALID",
            "detail": ""
          }
